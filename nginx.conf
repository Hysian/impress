# 印迹官网 - Nginx 静态部署配置（纯静态 SPA，避免 502）
#
# 502 常见原因：index 含 index.php 导致走 PHP-FPM 且未运行、
# 或存在 proxy_pass 但上游不可用。本配置仅做静态托管，不依赖 PHP/上游。

server {
    listen 80;
    server_name yj.1024.li yinji.1024.li;

    root /www/sites/yj.1024.li/index;
    index index.html;   # 仅用 index.html，不要 index.php，否则可能走 PHP 导致 502

    access_log /www/sites/yj.1024.li/log/access.log main;
    error_log  /www/sites/yj.1024.li/log/error.log;

    # 不要在此 server 使用 proxy_set_header / proxy_pass，否则需有可用上游，易 502

    location ^~ /.well-known/acme-challenge/ {
        allow all;
        root /usr/share/nginx/html;
    }

    # 静态资源带 hash，可长期缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /images/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA：未命中则回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 404 由 SPA 处理，无需单独 404 页面时可注释下一行
    # error_page 404 /index.html;
}

# 若部署在子路径（如 /app/）：先 BASE_PATH=/app/ pnpm build，再在 nginx 中单独配置 location /app/
